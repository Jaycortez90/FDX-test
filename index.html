<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FedEx Service Feedback</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<style>
:root {
  --fx-purple:#2f014f;
  --fx-purple-2:#4d148c;
  --fx-orange:#ff6600;
  --text:#ffffff;
  --muted:#eadbff;
  --line:rgba(255,255,255,.16);
  --panel:rgba(47,1,79,.58);
  --panel-strong:rgba(47,1,79,.74);
}
* { box-sizing:border-box; }
html, body { height:100%; }
body {
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.10), transparent 34%),
    linear-gradient(135deg, #24003d 0%, #4d148c 62%, #ff6600 150%);
  color:var(--text);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.page {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.card {
  width:min(920px, 100%);
  background:var(--panel);
  border:1px solid var(--line);
  box-shadow:0 22px 60px rgba(0,0,0,.30);
  backdrop-filter: blur(10px);
  padding:28px 24px 24px;
}
.langbar {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:28px;
}
.langbtn {
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:#fff;
  padding:8px 12px;
  cursor:pointer;
  font-size:15px;
}
.langbtn.active {
  background:var(--fx-orange);
  border-color:rgba(255,255,255,.28);
}
.content {
  text-align:center;
}
.kicker {
  display:inline-block;
  margin-bottom:14px;
  padding:6px 12px;
  background:var(--fx-orange);
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  font-size:.78rem;
}
h1 {
  margin:0 0 14px;
  font-size:clamp(2rem, 5vw, 3.2rem);
  line-height:1.03;
  letter-spacing:-.04em;
}
.lead {
  margin:0;
  font-size:clamp(1rem, 2.2vw, 1.26rem);
  color:var(--muted);
  line-height:1.55;
}
.prompt {
  margin:28px 0 16px;
  font-size:1.05rem;
  font-weight:700;
}
.stars {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.star {
  border:none;
  background:transparent;
  color:rgba(255,255,255,.42);
  font-size:48px;
  line-height:1;
  cursor:pointer;
  padding:0;
  transition:transform .12s ease, color .12s ease;
}
.star:hover,
.star:focus-visible,
.star.active {
  color:#ffd166;
  transform:scale(1.08);
  outline:none;
}
.summary {
  margin:24px auto 0;
  width:min(460px, 100%);
  background:var(--panel-strong);
  border:1px solid var(--line);
  padding:16px;
}
.summary-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  text-align:left;
}
.summary-label {
  color:var(--muted);
  font-size:.92rem;
}
.summary-value {
  font-size:1.4rem;
  font-weight:800;
}
.breakdown {
  margin-top:14px;
  display:grid;
  gap:8px;
}
.break-row {
  display:grid;
  grid-template-columns:28px 1fr 44px;
  gap:10px;
  align-items:center;
}
.bar {
  height:10px;
  background:rgba(255,255,255,.12);
}
.bar > span {
  display:block;
  height:100%;
  background:var(--fx-orange);
  width:0%;
}
.note {
  margin-top:16px;
  min-height:24px;
  color:var(--muted);
  font-weight:700;
}
.error {
  color:#ffd1d1;
}
@media (max-width: 560px) {
  .card { padding:20px 16px 18px; }
  .langbar { margin-bottom:20px; }
  .langbtn { flex:1 1 calc(50% - 8px); text-align:center; }
  .star { font-size:42px; }
}
</style>
</head>
<body>
  <div class="page">
    <main class="card">
      <div class="langbar" id="langbar"></div>
      <section class="content">
        <div class="kicker">FedEx</div>
        <h1 id="headline"></h1>
        <p class="lead" id="line2"></p>
        <div class="prompt" id="prompt"></div>

        <div class="stars" id="stars" aria-label="Rating">
          <button class="star" data-score="1" aria-label="1 star">★</button>
          <button class="star" data-score="2" aria-label="2 stars">★</button>
          <button class="star" data-score="3" aria-label="3 stars">★</button>
          <button class="star" data-score="4" aria-label="4 stars">★</button>
          <button class="star" data-score="5" aria-label="5 stars">★</button>
        </div>

        <div class="note" id="note"></div>

        <section class="summary">
          <div class="summary-grid">
            <div>
              <div class="summary-label" id="ratingLabel"></div>
              <div class="summary-value" id="avgValue">-</div>
            </div>
            <div>
              <div class="summary-label" id="votesLabel"></div>
              <div class="summary-value" id="votesValue">-</div>
            </div>
          </div>
          <div class="breakdown" id="breakdown"></div>
        </section>
      </section>
    </main>
  </div>

bmit": "Az értékelése mentésre került.", "ratingLabel": "Jelenlegi értékelés", "votesLabel": "Szavazatok", "loading": "Értékelés betöltése...", "error": "Az értékelést nem sikerült menteni. Próbálja újra."}, "uz": {"label": "O‘zbek", "flag": "🇺🇿", "headline": "Tajriba muvaffaqiyatli yakunlandi!", "line2": "Hamkorligingiz uchun rahmat! Tez orada ko‘rishamiz...", "prompt": "Iltimos, xizmat sizga qanchalik yoqqanini baholang.", "submit": "Bahoyingiz saqlandi.", "ratingLabel": "Joriy baho", "votesLabel": "Ovozlar", "loading": "Baho yuklanmoqda...", "error": "Bahoni saqlab bo‘lmadi. Yana urinib ko‘ring."}, "tg": {"label": "Тоҷикӣ", "flag": "🇹🇯", "headline": "Таҷриба бо муваффақият анҷом ёфт!", "line2": "Ташаккур барои ҳамкориатон! Ба зудӣ мебинематон...", "prompt": "Лутфан арзёбӣ кунед, ки хизматрасонӣ то чӣ андоза ба шумо писанд омад.", "submit": "Баҳои шумо сабт шуд.", "ratingLabel": "Баҳои ҷорӣ", "votesLabel": "Овозҳо", "loading": "Баҳо бор мешавад...", "error": "Баҳо сабт нашуд. Лутфан дубора кӯшиш кунед."}, "ky": {"label": "Кыргызча", "flag": "🇰🇬", "headline": "Эксперимент ийгиликтүү аяктады!", "line2": "Кызматташканыңыз үчүн рахмат! Жакында көрүшөбүз...", "prompt": "Кызмат сизге канчалык жакканын баалаңыз.", "submit": "Бааңыз сакталды.", "ratingLabel": "Учурдагы баа", "votesLabel": "Добуштар", "loading": "Баа жүктөлүүдө...", "error": "Бааны сактоо мүмкүн болгон жок. Кайра аракет кылыңыз."}, "be": {"label": "Беларуская", "flag": "🇧🇾", "headline": "Эксперымент паспяхова завяршыўся!", "line2": "Дзякуй за супрацоўніцтва! Да хуткай сустрэчы...", "prompt": "Калі ласка, ацаніце, наколькі вам спадабаўся сэрвіс.", "submit": "Ваша ацэнка захавана.", "ratingLabel": "Бягучая ацэнка", "votesLabel": "Галасы", "loading": "Загрузка ацэнкі...", "error": "Не ўдалося захаваць ацэнку. Паспрабуйце яшчэ раз."}};
const LANG_ORDER = ["en", "de", "nl", "fr", "tr", "sv", "es", "it", "ro", "ru", "lt", "kk", "hi", "pl", "hu", "uz", "tg", "ky", "be"];
let CURRENT_LANG = "en";
let LAST_SELECTED = 0;

function detectLang() {
  const params = new URLSearchParams(window.location.search);
  const q = String(params.get("lang") || "").toLowerCase();
  if (TRANSLATIONS[q]) return q;

  try {
    const saved = localStorage.getItem("feedback_lang") || "";
    if (TRANSLATIONS[saved]) return saved;
  } catch (e) {}

  const langs = navigator.languages || [navigator.language || "en"];
  for (const item of langs) {
    const base = String(item || "").toLowerCase().split("-")[0];
    if (TRANSLATIONS[base]) return base;
  }
  return "en";
}

function setLang(lang) {
  CURRENT_LANG = TRANSLATIONS[lang] ? lang : "en";
  try { localStorage.setItem("feedback_lang", CURRENT_LANG); } catch (e) {}
  const url = new URL(window.location.href);
  url.searchParams.set("lang", CURRENT_LANG);
  history.replaceState(null, "", url.toString());
  document.documentElement.lang = CURRENT_LANG;
  renderText();
  renderLangButtons();
}

function t() {
  return TRANSLATIONS[CURRENT_LANG] || TRANSLATIONS.en;
}

function renderLangButtons() {
  const host = document.getElementById("langbar");
  host.innerHTML = LANG_ORDER.map((code) => {
    const item = TRANSLATIONS[code];
    const active = code === CURRENT_LANG ? " active" : "";
    return `<button class="langbtn${active}" data-lang="${code}">${item.flag} ${item.label}</button>`;
  }).join("");

  host.querySelectorAll(".langbtn").forEach((btn) => {
    btn.addEventListener("click", () => setLang(btn.getAttribute("data-lang") || "en"));
  });
}

function renderText() {
  const pack = t();
  document.getElementById("headline").textContent = pack.headline;
  document.getElementById("line2").textContent = pack.line2;
  document.getElementById("prompt").textContent = pack.prompt;
  document.getElementById("ratingLabel").textContent = pack.ratingLabel;
  document.getElementById("votesLabel").textContent = pack.votesLabel;
  if (!document.getElementById("note").dataset.locked) {
    document.getElementById("note").textContent = pack.loading;
    document.getElementById("note").classList.remove("error");
  }
}

function setStars(score) {
  LAST_SELECTED = Number(score || 0);
  document.querySelectorAll(".star").forEach((btn) => {
    const btnScore = Number(btn.getAttribute("data-score") || 0);
    btn.classList.toggle("active", btnScore <= LAST_SELECTED);
  });
}

function renderBreakdown(counts) {
  const total = Object.values(counts || {}).reduce((acc, val) => acc + Number(val || 0), 0);
  const host = document.getElementById("breakdown");
  host.innerHTML = [5,4,3,2,1].map((score) => {
    const count = Number((counts && counts[String(score)]) || 0);
    const pct = total ? ((count / total) * 100).toFixed(1) : "0.0";
    return `
      <div class="break-row">
        <div>${score}★</div>
        <div class="bar"><span style="width:${pct}%"></span></div>
        <div>${count}</div>
      </div>
    `;
  }).join("");
}

async function loadRating() {
  const note = document.getElementById("note");
  note.dataset.locked = "";
  note.textContent = t().loading;
  note.classList.remove("error");

  try {
    const res = await fetch("/api/rating", { cache:"no-store" });
    const data = await res.json();
    document.getElementById("avgValue").textContent = Number(data.average || 0).toFixed(2);
    document.getElementById("votesValue").textContent = String(data.total_votes || 0);
    renderBreakdown(data.counts || {});
    note.textContent = "";
  } catch (e) {
    note.textContent = t().error;
    note.classList.add("error");
  }
}

async function sendRating(score) {
  const note = document.getElementById("note");
  note.dataset.locked = "1";
  note.textContent = "…";
  note.classList.remove("error");
  setStars(score);

  try {
    const res = await fetch("/api/rating", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ score })
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || "Save failed");
    }

    document.getElementById("avgValue").textContent = Number(data.average || 0).toFixed(2);
    document.getElementById("votesValue").textContent = String(data.total_votes || 0);
    renderBreakdown(data.counts || {});
    note.textContent = t().submit;
  } catch (e) {
    note.textContent = t().error;
    note.classList.add("error");
  }
}

function bindStars() {
  document.querySelectorAll(".star").forEach((btn) => {
    btn.addEventListener("mouseenter", () => setStars(btn.getAttribute("data-score")));
    btn.addEventListener("focus", () => setStars(btn.getAttribute("data-score")));
    btn.addEventListener("click", () => sendRating(Number(btn.getAttribute("data-score") || 0)));
  });

  document.getElementById("stars").addEventListener("mouseleave", () => setStars(LAST_SELECTED));
}

CURRENT_LANG = detectLang();
renderText();
renderLangButtons();
bindStars();
loadRating();
</script>
</body>
</html>
